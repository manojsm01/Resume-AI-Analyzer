spring.application.name=backend

# Database Configuration
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/resumeiq}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:password}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate Configuration
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Server Configuration
server.port=${PORT:8080}

# JWT Configuration
jwt.secret=${JWT_SECRET:your_secure_jwt_secret_key_here}
jwt.expiration=86400000

# Gemini AI API Configuration
gemini.api.key=${GEMINI_API_KEY:your_google_gemini_api_key_here}
gemini.model.primary=${GEMINI_MODEL_PRIMARY:gemini-2.5-flash-lite}
gemini.model.fallback=${GEMINI_MODEL_FALLBACK:gemini-2.5-flash}

# Email Configuration
spring.mail.host=${SMTP_HOST:smtp.gmail.com}
spring.mail.port=${SMTP_PORT:587}
spring.mail.username=${SMTP_USERNAME:your_email@gmail.com}
spring.mail.password=${SMTP_PASSWORD:your_app_password}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
